<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BankPrep Syllabus Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary: #4f46e5; --primary-light: #818cf8; --secondary: #ec4899;
            --bg-body: #f8fafc; --bg-card: #ffffff;
            --text-main: #0f172a; --text-muted: #64748b;
            --success: #10b981; --danger: #ef4444; --warning: #f59e0b;
            --border-color: rgba(0,0,0,0.05);
            --shadow-card: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            --radius: 16px; --modal-overlay: rgba(15, 23, 42, 0.6);
            --chat-user-bg: #4f46e5; --chat-ai-bg: #f1f5f9; --chat-text-ai: #0f172a;
        }

        [data-theme="dark"] {
            --primary: #6366f1; --bg-body: #0f172a; --bg-card: #1e293b;
            --text-main: #f1f5f9; --text-muted: #94a3b8;
            --border-color: rgba(255,255,255,0.05);
            --shadow-card: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
            --modal-overlay: rgba(0, 0, 0, 0.85);
            --chat-user-bg: #6366f1; --chat-ai-bg: #334155; --chat-text-ai: #f1f5f9;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; transition: background-color 0.3s ease, color 0.3s ease; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg-body); color: var(--text-main); margin: 0; padding-bottom: 90px; }

        #authScreen { position: fixed; inset: 0; background: linear-gradient(135deg, var(--primary), var(--secondary)); display: flex; align-items: center; justify-content: center; z-index: 5000; }
        .auth-card { background: var(--bg-card); width: 100%; max-width: 360px; padding: 32px 28px; border-radius: 28px; box-shadow: 0 25px 60px rgba(0,0,0,0.25); text-align: center; }
        .auth-input { width: 100%; padding: 14px 16px; border-radius: 14px; border: 1px solid var(--border-color); background: var(--bg-body); font-size: 0.95rem; margin-bottom: 14px; color: var(--text-main); }
        .auth-btn { width: 100%; padding: 14px; border-radius: 14px; border: none; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; font-weight: 700; cursor: pointer; }

        #appContainer { display: none; }
        .fixed-top-container { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; background-color: var(--bg-body); }
        .app-header { background: linear-gradient(135deg, var(--primary), var(--secondary)); padding: 20px 20px 50px 20px; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; color: white; position: relative; z-index: 2; }
        
        .header-actions { display: flex; gap: 12px; position: absolute; right: 20px; top: 20px; }
        .icon-btn { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); color: white; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        .global-progress-container { margin-top: 20px; background: rgba(0,0,0,0.25); height: 8px; border-radius: 10px; overflow: hidden; }
        .global-progress-fill { height: 100%; background: #fff; width: 0%; transition: width 0.6s ease; }
        .progress-label { font-size: 0.8rem; text-align: right; margin-top: 6px; font-weight: 600; color: white; }

        .category-nav { display: flex; gap: 12px; overflow-x: auto; padding: 0 20px 15px 20px; margin-top: -35px; position: relative; z-index: 3; scrollbar-width: none; }
        .nav-item { background: var(--bg-card); min-width: 95px; padding: 12px 8px; border-radius: 14px; text-align: center; box-shadow: var(--shadow-card); cursor: pointer; border: 2px solid transparent; }
        .nav-item.active { border-color: var(--primary); }
        .nav-icon { font-size: 1.6rem; display: block; }
        .nav-label { font-size: 0.75rem; font-weight: 700; color: var(--text-main); }
        
        .content-area { padding: 0 20px 25px 20px; margin-top: 10px; }
        .section-header { font-size: 0.8rem; text-transform: uppercase; color: var(--text-muted); font-weight: 800; margin: 15px 0 12px 5px; display: flex; align-items: center; }
        .section-header::before { content: ''; width: 6px; height: 6px; background: var(--secondary); border-radius: 50%; margin-right: 10px; }

        .topic-wrapper { background: var(--bg-card); border-radius: var(--radius); margin-bottom: 14px; box-shadow: var(--shadow-card); overflow: hidden; border: 1px solid var(--border-color); }
        .topic-main { padding: 18px; display: flex; justify-content: space-between; align-items: center; }
        .topic-status { font-size: 0.7rem; color: var(--text-muted); }
        .topic-status.active { color: var(--success); font-weight: 600; }

        .switch { position: relative; display: inline-block; width: 48px; height: 28px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e1; transition: .3s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 22px; width: 22px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--success); }
        input:checked + .slider:before { transform: translateX(20px); }

        .chat-overlay { position: fixed; inset: 0; background: var(--modal-overlay); z-index: 2500; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; backdrop-filter: blur(5px); }
        .chat-overlay.show { opacity: 1; pointer-events: auto; }
        .chat-container { width: 100%; max-width: 600px; background: var(--bg-card); border-top-left-radius: 24px; border-top-right-radius: 24px; padding: 25px; display: flex; flex-direction: column; box-shadow: 0 -10px 40px rgba(0,0,0,0.2); }
        
        .search-container { padding: 15px 20px 10px 20px; background: var(--bg-body); }
        .search-input { width: 100%; padding: 12px 40px; border-radius: 12px; border: 1px solid var(--border-color); background: var(--bg-card); color: var(--text-main); font-family: inherit; outline: none; }
        
        .fab { position: fixed; bottom: 30px; right: 20px; width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border: none; box-shadow: 0 8px 20px rgba(79, 70, 229, 0.4); z-index: 2000; display: none; align-items: center; justify-content: center; cursor: pointer; }
        
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: #1e293b; color: white; padding: 12px 24px; border-radius: 50px; z-index: 4000; transition: transform 0.3s ease; }
        .toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <div id="authScreen">
        <div class="auth-card">
            <span style="font-size:3rem;">🏦</span>
            <h2>BankPrep Cloud</h2>
            <input type="email" id="email" class="auth-input" placeholder="Email">
            <input type="password" id="password" class="auth-input" placeholder="Password">
            <button class="auth-btn" onclick="handleLogin()">Sign In</button>
        </div>
    </div>

    <div id="appContainer">
        <div class="chat-overlay" id="taskModal">
            <div class="chat-container">
                <h3>New Daily Task</h3>
                <input type="text" id="newTaskName" class="auth-input" placeholder="e.g. 10 Puzzles">
                <div class="days-selector" id="daysSelector" style="display:flex; gap:5px; margin-bottom:15px;">
                    <button class="day-btn" onclick="this.classList.toggle('selected')" data-day="0">S</button>
                    <button class="day-btn" onclick="this.classList.toggle('selected')" data-day="1">M</button>
                    <button class="day-btn" onclick="this.classList.toggle('selected')" data-day="2">T</button>
                    <button class="day-btn" onclick="this.classList.toggle('selected')" data-day="3">W</button>
                    <button class="day-btn" onclick="this.classList.toggle('selected')" data-day="4">T</button>
                    <button class="day-btn" onclick="this.classList.toggle('selected')" data-day="5">F</button>
                    <button class="day-btn" onclick="this.classList.toggle('selected')" data-day="6">S</button>
                </div>
                <button class="auth-btn" onclick="saveNewTask()">Create</button>
                <button onclick="closeTaskModal()" style="background:none; border:none; margin-top:10px; cursor:pointer; color:var(--text-muted);">Cancel</button>
            </div>
        </div>

        <div class="chat-overlay" id="editMockModal">
            <div class="chat-container">
                <h3>Edit Scorecard</h3>
                <select id="editMockType" class="auth-input" onchange="toggleEditMockInputs()">
                    <option value="SBI PO">SBI PO</option><option value="IBPS PO">IBPS PO</option><option value="Other">Other</option>
                </select>
                <input type="number" id="editMockNumber" class="auth-input" placeholder="Mock #">
                <input type="text" id="editMockCustomName" class="auth-input" style="display:none;" placeholder="Name">
                <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px;">
                    <input type="number" id="editE" class="auth-input" step="0.01" placeholder="Eng">
                    <input type="number" id="editQ" class="auth-input" step="0.01" placeholder="Quant">
                    <input type="number" id="editR" class="auth-input" step="0.01" placeholder="Logic">
                </div>
                <button class="auth-btn" onclick="updateExistingMock()">Update</button>
                <button onclick="closeEditModal()" style="background:none; border:none; margin-top:10px; cursor:pointer; color:var(--text-muted);">Cancel</button>
            </div>
        </div>

        <div id="toast" class="toast"><span id="toastMsg">Success</span></div>

        <div class="fixed-top-container" id="fixedHeader">
            <header class="app-header">
                <div>
                    <h1 style="margin:0; font-size:1.2rem;">BankPrep Tracker</h1>
                    <div style="font-size:0.7rem; opacity:0.8;">By Durga Prasad</div>
                </div>
                <div class="header-actions">
                    <button class="icon-btn" onclick="toggleTheme()">🌓</button>
                    <button class="icon-btn" onclick="handleLogout()">🚪</button>
                </div>
                <div class="global-progress-container"><div class="global-progress-fill" id="globalBar"></div></div>
                <div class="progress-label" id="globalText">0% Covered</div>
            </header>
            <nav class="category-nav" id="categoryNav"></nav>
            <div class="search-container">
                <input type="text" id="topicSearch" class="search-input" placeholder="Search topics..." oninput="handleSearch()">
            </div>
        </div>

        <main class="content-area" id="contentArea"></main>
        <button class="fab" id="addTaskBtn" onclick="openTaskModal()">+</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBPSXcRdCoik4vAKJxjB2258bWSpe_6nGU",
            authDomain: "bankprep-tracker.firebaseapp.com",
            projectId: "bankprep-tracker",
            storageBucket: "bankprep-tracker.firebasestorage.app",
            messagingSenderId: "254084569056",
            appId: "1:254084569056:web:a6e3a75e0d80372b373d85"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); const db = firebase.firestore();

        const syllabusData = {
            "daily": { label: "Daily", icon: "📅", sections: [] },
            "analysis": { label: "Analysis", icon: "📈", sections: [] },
            "basics": { label: "Basics", icon: "⚡", sections: [{ title: "Drills", topics: ["Tables (1-20)", "Tables (21-30)", "Squares (1-50)", "Cubes (1-30)"] }] },
            "quant": { label: "Quant", icon: "📊", sections: [{ title: "Core", topics: ["Simplification", "Percentages", "Ratio", "Averages", "SI & CI", "Time & Work"] }] },
            "reasoning": { label: "Logic", icon: "🧠", sections: [{ title: "Logic", topics: ["Syllogism", "Inequality", "Coding", "Blood Relation", "Puzzles"] }] },
            "english": { label: "English", icon: "📖", sections: [{ title: "Grammar", topics: ["Tenses", "Articles", "Error Spotting", "Reading Comprehension"] }] }
        };

        let state = {}; let currentTab = 'quant'; let currentUser = null; let currentEditId = null;

        auth.onAuthStateChanged(user => {
            if (user) { currentUser = user; document.getElementById('authScreen').style.display = 'none'; document.getElementById('appContainer').style.display = 'block'; loadUserData(); }
            else { currentUser = null; document.getElementById('authScreen').style.display = 'flex'; document.getElementById('appContainer').style.display = 'none'; }
        });

        function loadUserData() {
            db.collection('users').doc(currentUser.uid).onSnapshot(doc => {
                state = (doc.exists) ? (doc.data().progress || {}) : {};
                if (!state.customTasks) state.customTasks = {};
                if (!state.mockScores) state.mockScores = {};
                renderTabs(); renderContent(currentTab); updateGlobalStats(); adjustPadding();
            });
        }

        function saveState() {
            if(currentUser) db.collection('users').doc(currentUser.uid).set({ progress: state });
            updateGlobalStats();
        }

        function renderTabs() {
            const nav = document.getElementById('categoryNav'); nav.innerHTML = '';
            Object.keys(syllabusData).forEach(k => {
                const d = document.createElement('div');
                d.className = `nav-item ${k===currentTab?'active':''}`;
                d.innerHTML = `<span class="nav-icon">${syllabusData[k].icon}</span><span class="nav-label">${syllabusData[k].label}</span>`;
                d.onclick = () => { currentTab = k; renderTabs(); renderContent(k); };
                nav.appendChild(d);
            });
            document.getElementById('addTaskBtn').style.display = (currentTab==='daily')?'flex':'none';
        }

        function renderContent(k) {
            const c = document.getElementById('contentArea'); c.innerHTML = '';
            if (k === 'daily') { renderDaily(c); return; }
            if (k === 'analysis') { renderAnalysis(c); return; }

            syllabusData[k].sections.forEach(s => {
                c.innerHTML += `<div class="section-header">${s.title}</div>`;
                s.topics.forEach(t => {
                    const id = `${k}-${t.replace(/[^a-zA-Z0-9]/g,'')}`;
                    const td = state[id] || {done:false};
                    c.innerHTML += `<div class="topic-wrapper"><div class="topic-main"><div><h3>${t}</h3><div class="topic-status ${td.done?'active':''}">${td.done?'Done':'Pending'}</div></div><label class="switch"><input type="checkbox" onchange="toggleTopic('${id}')" ${td.done?'checked':''}><span class="slider"></span></label></div></div>`;
                });
            });
        }

        function renderAnalysis(container) {
            container.innerHTML = `
                <div class="section-header">New Scorecard</div>
                <div class="topic-wrapper" style="padding:15px;">
                    <select id="mockType" class="auth-input" onchange="toggleMockInputs()"><option value="SBI PO">SBI PO</option><option value="IBPS PO">IBPS PO</option><option value="Other">Other</option></select>
                    <input type="number" id="mockNumber" class="auth-input" placeholder="Mock #">
                    <input type="text" id="mockCustomName" class="auth-input" style="display:none;" placeholder="Name">
                    <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px;">
                        <input type="number" id="scE" class="auth-input" step="0.01" placeholder="Eng">
                        <input type="number" id="scQ" class="auth-input" step="0.01" placeholder="Quant">
                        <input type="number" id="scR" class="auth-input" step="0.01" placeholder="Logic">
                    </div>
                    <button class="auth-btn" onclick="saveScore()">Save</button>
                </div>
                <div id="mockList"></div>`;
            renderMockList();
        }

        window.saveScore = function() {
            const type = document.getElementById('mockType').value;
            const e = parseFloat(document.getElementById('scE').value) || 0;
            const q = parseFloat(document.getElementById('scQ').value) || 0;
            const r = parseFloat(document.getElementById('scR').value) || 0;
            const name = (type==='Other')?document.getElementById('mockCustomName').value:`${type} - Mock ${document.getElementById('mockNumber').value}`;
            const id = 'mock-' + Date.now();
            state.mockScores[id] = { name, english: e.toFixed(2), quant: q.toFixed(2), reasoning: r.toFixed(2), total: (e+q+r).toFixed(2), date: new Date().toISOString() };
            saveState(); renderContent('analysis');
        }

        function renderMockList() {
            const list = document.getElementById('mockList'); if(!list) return;
            const sorted = Object.entries(state.mockScores).sort((a,b) => new Date(b[1].date) - new Date(a[1].date));
            sorted.forEach(([id, m]) => {
                list.innerHTML += `<div class="topic-wrapper" style="padding:15px;"><div style="display:flex; justify-content:space-between;"><div><strong>${m.name}</strong><div style="font-size:0.7rem;">${new Date(m.date).toLocaleDateString()}</div></div><div style="text-align:right;"><div style="color:var(--primary); font-weight:700;">${m.total}</div><div style="display:flex; gap:10px;"><span onclick="editMock('${id}')" style="color:var(--primary); cursor:pointer; font-size:0.7rem;">Edit</span><span onclick="deleteMock('${id}')" style="color:var(--danger); cursor:pointer; font-size:0.7rem;">Delete</span></div></div></div><div style="font-size:0.7rem; margin-top:5px;">E: ${m.english} | Q: ${m.quant} | R: ${m.reasoning}</div></div>`;
            });
        }

        window.deleteMock = function(id) { if(confirm("Delete permanently?")) { delete state.mockScores[id]; saveState(); } };

        window.editMock = function(id) {
            currentEditId = id; const m = state.mockScores[id];
            document.getElementById('editE').value = m.english; document.getElementById('editQ').value = m.quant; document.getElementById('editR').value = m.reasoning;
            document.getElementById('editMockModal').classList.add('show');
        };

        window.updateExistingMock = function() {
            const m = state.mockScores[currentEditId];
            m.english = parseFloat(document.getElementById('editE').value).toFixed(2);
            m.quant = parseFloat(document.getElementById('editQ').value).toFixed(2);
            m.reasoning = parseFloat(document.getElementById('editR').value).toFixed(2);
            m.total = (parseFloat(m.english)+parseFloat(m.quant)+parseFloat(m.reasoning)).toFixed(2);
            saveState(); closeEditModal();
        }

        function renderDaily(container) {
            const day = new Date().getDay(); const date = new Date().toISOString().split('T')[0];
            container.innerHTML = `<div class="section-header">Checklist</div>`;
            Object.entries(state.customTasks).forEach(([id, t]) => {
                if (t.days.includes(day)) {
                    const done = t.completions && t.completions[date];
                    container.innerHTML += `<div class="topic-wrapper"><div class="topic-main"><div><h3>${t.name}</h3><div class="topic-status ${done?'active':''}">${done?'Done':'Pending'}</div></div><label class="switch"><input type="checkbox" onchange="toggleDaily('${id}')" ${done?'checked':''}><span class="slider"></span></label></div></div>`;
                }
            });
        }

        window.toggleDaily = function(id) {
            const date = new Date().toISOString().split('T')[0];
            if(!state.customTasks[id].completions) state.customTasks[id].completions = {};
            if(event.target.checked) state.customTasks[id].completions[date] = true;
            else delete state.customTasks[id].completions[date];
            saveState();
        }

        function toggleTopic(id) { if(!state[id]) state[id]={}; state[id].done = event.target.checked; saveState(); }
        function handleLogin() { auth.signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('password').value).catch(e => alert(e.message)); }
        function handleLogout() { auth.signOut(); }
        function toggleTheme() { const d = document.documentElement; const t = d.getAttribute('data-theme')==='dark'?'light':'dark'; d.setAttribute('data-theme', t); localStorage.setItem('theme', t); }
        function initTheme() { const t = localStorage.getItem('theme') || 'light'; document.documentElement.setAttribute('data-theme', t); }
        function openTaskModal() { document.getElementById('taskModal').classList.add('show'); }
        function closeTaskModal() { document.getElementById('taskModal').classList.remove('show'); }
        function closeEditModal() { document.getElementById('editMockModal').classList.remove('show'); }
        function toggleMockInputs() { const t = document.getElementById('mockType').value; document.getElementById('testNumContainer').style.display = t==='Other'?'none':'block'; document.getElementById('customNameContainer').style.display = t==='Other'?'block':'none'; }
        function toggleEditMockInputs() { const t = document.getElementById('editMockType').value; document.getElementById('editTestNumContainer').style.display = t==='Other'?'none':'block'; document.getElementById('editCustomNameContainer').style.display = t==='Other'?'block':'none'; }
        function adjustPadding() { document.body.style.paddingTop = document.getElementById('fixedHeader').offsetHeight + 'px'; }
        function updateGlobalStats() {
            let total = 0, done = 0;
            Object.keys(syllabusData).filter(k => k!=='daily'&&k!=='analysis').forEach(k => {
                syllabusData[k].sections.forEach(s => s.topics.forEach(t => {
                    total++; if(state[`${k}-${t.replace(/[^a-zA-Z0-9]/g,'')}`]?.done) done++;
                }));
            });
            const p = Math.round((done/total)*100) || 0;
            document.getElementById('globalBar').style.width = p+'%'; document.getElementById('globalText').textContent = p+'% Covered';
        }
        function showToast(m) { const t = document.getElementById('toast'); document.getElementById('toastMsg').textContent = m; t.className = 'toast show'; setTimeout(() => t.className = 'toast', 3000); }
        window.saveNewTask = function() {
            const name = document.getElementById('newTaskName').value;
            const days = Array.from(document.querySelectorAll('.day-btn.selected')).map(b => parseInt(b.dataset.day));
            if(!name || days.length === 0) return;
            state.customTasks['task-'+Date.now()] = { name, days, completions: {} };
            saveState(); closeTaskModal();
        }
        window.addEventListener('resize', adjustPadding);
    </script>
</body>
</html>
