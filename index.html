<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BankPrep Syllabus Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <style>
        /* --- CSS VARIABLES --- */
        :root {
            --primary: #4f46e5; --primary-light: #818cf8; --secondary: #ec4899;
            --bg-body: #f8fafc; --bg-card: #ffffff;
            --text-main: #0f172a; --text-muted: #64748b;
            --success: #10b981; --danger: #ef4444; --warning: #f59e0b;
            --border-color: rgba(0,0,0,0.05);
            --shadow-card: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            --radius: 16px; --drawer-bg: #f8fafc; --task-tag-bg: #f1f5f9;
            --modal-overlay: rgba(15, 23, 42, 0.6);
            --chat-user-bg: #4f46e5; --chat-ai-bg: #f1f5f9; --chat-text-ai: #0f172a;
        }

        [data-theme="dark"] {
            --primary: #6366f1; --bg-body: #0f172a; --bg-card: #1e293b;
            --text-main: #f1f5f9; --text-muted: #94a3b8;
            --border-color: rgba(255,255,255,0.05);
            --shadow-card: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
            --drawer-bg: #0f172a; --task-tag-bg: #334155;
            --modal-overlay: rgba(0, 0, 0, 0.85);
            --chat-user-bg: #6366f1; --chat-ai-bg: #334155; --chat-text-ai: #f1f5f9;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; transition: background-color 0.3s ease, color 0.3s ease; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg-body); color: var(--text-main); margin: 0; padding-bottom: 90px; }

        /* --- AUTH SCREEN --- */
        #authScreen { position: fixed; inset: 0; background: linear-gradient(135deg, var(--primary), var(--secondary)); display: flex; align-items: center; justify-content: center; z-index: 5000; }
        .auth-card { background: var(--bg-card); width: 100%; max-width: 360px; padding: 32px 28px; border-radius: 28px; box-shadow: 0 25px 60px rgba(0,0,0,0.25); text-align: center; animation: fadeIn 0.4s ease; }
        .auth-logo { font-size: 3.2rem; margin-bottom: 8px; }
        .auth-title { font-size: 1.6rem; font-weight: 800; margin-bottom: 4px; }
        .auth-sub { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 24px; }
        .auth-input { width: 100%; padding: 14px 16px; border-radius: 14px; border: 1px solid var(--border-color); background: var(--bg-body); font-size: 0.95rem; margin-bottom: 14px; color: var(--text-main); }
        .auth-input:focus { outline: none; border-color: var(--primary); }
        .auth-btn { width: 100%; padding: 14px; border-radius: 14px; border: none; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; font-weight: 700; font-size: 1rem; cursor: pointer; margin-top: 5px; }
        .auth-link { margin-top: 18px; font-size: 0.85rem; color: var(--primary); cursor: pointer; font-weight: 600; }

        #appContainer { display: none; }

        /* --- HEADER --- */
        .fixed-top-container { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; background-color: var(--bg-body); }
        .app-header { background: linear-gradient(135deg, var(--primary), var(--secondary)); padding: 20px 20px 50px 20px; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; color: white; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.2); position: relative; z-index: 2; }
        .header-top { display: flex; flex-direction: column; align-items: flex-start; justify-content: center; }
        .header-actions { align-self: flex-end; margin-top: 10px; display: flex; gap: 12px; }
        .icon-btn { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); color: white; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; backdrop-filter: blur(4px); }
        .icon-btn.ai-btn { background: linear-gradient(135deg, #FFD700, #FFA500); border: none; color: #78350f; }
        .global-progress-container { margin-top: 20px; background: rgba(0,0,0,0.25); height: 8px; border-radius: 10px; overflow: hidden; position: relative; }
        .global-progress-fill { height: 100%; background: #fff; width: 0%; transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .progress-label { font-size: 0.8rem; text-align: right; margin-top: 6px; font-weight: 600; color: white; }

        /* --- NAVIGATION --- */
        .category-nav { display: flex; gap: 12px; overflow-x: auto; padding: 0 20px 15px 20px; margin-top: -35px; scrollbar-width: none; position: relative; z-index: 3; }
        .category-nav::-webkit-scrollbar { display: none; }
        .nav-item { background: var(--bg-card); min-width: 95px; padding: 12px 8px; border-radius: 14px; text-align: center; box-shadow: var(--shadow-card); cursor: pointer; transition: all 0.25s; opacity: 0.95; transform: scale(0.98); border: 2px solid transparent; flex-shrink: 0; }
        .nav-item.active { border-color: var(--primary); transform: scale(1); opacity: 1; }
        .nav-icon { font-size: 1.6rem; display: block; margin-bottom: 2px; }
        .nav-label { font-size: 0.75rem; font-weight: 700; color: var(--text-main); }
        
        .content-area { padding: 0 20px 25px 20px; animation: fadeIn 0.4s ease-out; }
        .section-header { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1.2px; color: var(--text-muted); font-weight: 800; margin: 15px 0 12px 5px; display: flex; align-items: center; }
        .section-header::before { content: ''; width: 6px; height: 6px; background: var(--secondary); border-radius: 50%; margin-right: 10px; }

        /* --- SEARCH --- */
        .search-container { padding: 15px 20px 10px 20px; background: var(--bg-body); transition: background 0.3s ease; }
        .search-box { position: relative; display: flex; align-items: center; }
        .search-input { width: 100%; padding: 12px 40px 12px 42px; border-radius: 12px; border: 1px solid var(--border-color); background: var(--bg-card); color: var(--text-main); font-family: 'Poppins', sans-serif; font-size: 0.9rem; outline: none; box-shadow: var(--shadow-card); transition: all 0.3s ease; }
        .search-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }
        .search-icon { position: absolute; left: 14px; color: var(--text-muted); display: flex; align-items: center; pointer-events: none; }
        .search-clear { position: absolute; right: 12px; background: none; border: none; color: var(--text-muted); font-size: 1.2rem; cursor: pointer; display: none; padding: 0; }
        .search-clear.show { display: block; }

        /* --- CARDS --- */
        .topic-wrapper { background: var(--bg-card); border-radius: var(--radius); margin-bottom: 14px; box-shadow: var(--shadow-card); overflow: hidden; border: 1px solid var(--border-color); }
        .topic-main { padding: 18px; display: flex; justify-content: space-between; align-items: center; background: var(--bg-card); }
        .topic-info h3 { margin: 0; font-size: 0.95rem; font-weight: 600; color: var(--text-main); }
        .topic-status { font-size: 0.7rem; margin-top: 4px; color: var(--text-muted); }
        .topic-status.active { color: var(--success); font-weight: 600; }

        .switch { position: relative; display: inline-block; width: 48px; height: 28px; flex-shrink: 0; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #cbd5e1; transition: .3s; border-radius: 34px; }
        [data-theme="dark"] .slider { background-color: #334155; }
        .slider:before { position: absolute; content: ""; height: 22px; width: 22px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
        .master-switch input:checked + .slider { background-color: var(--success); } .master-switch input:checked + .slider:before { transform: translateX(20px); }

        .task-card { background: var(--bg-card); border-radius: 16px; padding: 20px; margin-bottom: 15px; box-shadow: var(--shadow-card); display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--warning); }
        .task-card.r4 { border-left-color: var(--primary); } .task-card.r7 { border-left-color: var(--secondary); } .task-card.completed { opacity: 0.5; filter: grayscale(1); }
        .task-meta h4 { margin: 0 0 5px 0; font-size: 1rem; color: var(--text-main); }
        .task-tag { font-size: 0.75rem; background: var(--task-tag-bg); padding: 3px 8px; border-radius: 6px; color: var(--text-muted); font-weight: 600; }

        /* --- MODALS & FAB --- */
        .fab { position: fixed; bottom: 30px; right: 20px; width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border: none; box-shadow: 0 8px 20px rgba(79, 70, 229, 0.4); z-index: 2000; cursor: pointer; display: none; align-items: center; justify-content: center; }
        .chat-overlay { position: fixed; inset: 0; background: var(--modal-overlay); z-index: 2500; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; backdrop-filter: blur(5px); }
        .chat-overlay.show { opacity: 1; pointer-events: auto; }
        .chat-container { width: 100%; max-width: 600px; height: auto; background: var(--bg-card); border-top-left-radius: 24px; border-top-right-radius: 24px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 -10px 40px rgba(0,0,0,0.2); transform: translateY(100%); transition: transform 0.3s ease; padding: 25px; }
        .chat-overlay.show .chat-container { transform: translateY(0); }
        .days-selector { display: flex; gap: 8px; justify-content: space-between; margin-top: 10px; }
        .day-btn { width: 38px; height: 38px; border-radius: 10px; border: 1px solid var(--border-color); background: var(--bg-body); color: var(--text-main); font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .day-btn.selected { background: var(--primary); color: white; border-color: var(--primary); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="authScreen">
        <div class="auth-card">
            <span class="auth-logo">🏦</span>
            <div class="auth-title">BankPrep Cloud</div>
            <input type="email" id="email" class="auth-input" placeholder="Email Address">
            <input type="password" id="password" class="auth-input" placeholder="Password">
            <button class="auth-btn" onclick="handleLogin()">Sign In</button>
            <div class="auth-link" onclick="toggleAuth()">New here? Create Account</div>
            <div id="authError" style="color:var(--danger); font-size:0.8rem; margin-top:10px;"></div>
        </div>
    </div>

    <div id="appContainer">
        <div class="chat-overlay" id="aiChat">
            <div class="chat-container" style="height:80vh; padding:0;">
                <div class="chat-header" style="padding:15px 20px; border-bottom:1px solid var(--border-color); display:flex; justify-content:space-between; align-items:center;">
                    <div class="chat-title">✨ BankPrep Tutor</div>
                    <button class="chat-close" onclick="closeChat()">×</button>
                </div>
                <div id="chatHistory" style="flex:1; overflow-y:auto; padding:20px; background:var(--bg-body); display:flex; flex-direction:column; gap:15px;"></div>
                <div style="padding:15px; background:var(--bg-card); display:flex; gap:10px;">
                    <textarea id="chatInput" class="chat-input" placeholder="Ask a doubt..." rows="1" style="flex:1; border-radius:20px; padding:10px; border:1px solid var(--border-color);"></textarea>
                    <button onclick="sendToGemini()" style="width:40px; height:40px; border-radius:50%; background:var(--primary); color:white; border:none;">➤</button>
                </div>
            </div>
        </div>

        <div class="chat-overlay" id="genericModal">
            <div class="chat-container" id="modalContent"></div>
        </div>

        <div class="fixed-top-container" id="fixedHeader">
            <header class="app-header">
                <div class="header-top">
                    <h1 style="margin:0; font-size:1.25rem;">BankPrep Tracker</h1>
                    <div class="header-actions">
                        <button class="icon-btn ai-btn" onclick="openChat()">✨</button>
                        <button class="icon-btn" onclick="toggleTheme()" id="themeBtn"></button>
                        <button class="icon-btn" onclick="handleLogout()">🚪</button>
                    </div>
                </div>
                <div class="global-progress-container"><div class="global-progress-fill" id="globalBar"></div></div>
                <div class="progress-label" id="globalText">0% Covered</div>
            </header>
            <nav class="category-nav" id="categoryNav"></nav>
            <div class="search-container">
                <div class="search-box">
                    <input type="text" id="topicSearch" class="search-input" placeholder="Search...">
                    <button class="search-clear" id="searchClear" onclick="clearSearch()">×</button>
                </div>
            </div>
        </div>

        <main class="content-area" id="contentArea"></main>

        <button class="fab" id="addTaskBtn" onclick="openContextModal()">+</button>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBPSXcRdCoik4vAKJxjB2258bWSpe_6nGU", authDomain: "bankprep-tracker.firebaseapp.com", projectId: "bankprep-tracker", storageBucket: "bankprep-tracker.firebasestorage.app", messagingSenderId: "254084569056", appId: "1:254084569056:web:a6e3a75e0d80372b373d85" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); const db = firebase.firestore();

        const syllabusData = {
            "daily": { label: "Daily", icon: "📅" },
            "planner": { label: "Planner", icon: "🕒" },
            "basics": { label: "Basics", icon: "⚡", sections: [{ title: "Calculation", topics: ["Tables (1-20)", "Tables (21-30)", "Squares (1-50)", "Cubes (1-30)"] }] },
            "quant": { label: "Quant", icon: "📊", sections: [{ title: "Arithmetic", topics: ["Percentages", "Ratio", "Average", "Profit Loss", "SI & CI", "Time Work"] }] },
            "reasoning": { label: "Logic", icon: "🧠", sections: [{ title: "Reasoning", topics: ["Syllogism", "Inequality", "Puzzles", "Seating"] }] },
            "english": { label: "English", icon: "📖", sections: [{ title: "Grammar", topics: ["Tenses", "Articles", "Error Spotting"] }] }
        };

        let state = {}; let currentTab = 'planner'; let currentUser = null; let selectedDays = [];

        auth.onAuthStateChanged(user => {
            if (user) { currentUser = user; document.getElementById('authScreen').style.display = 'none'; document.getElementById('appContainer').style.display = 'block'; loadUserData(); }
            else { document.getElementById('authScreen').style.display = 'flex'; document.getElementById('appContainer').style.display = 'none'; }
        });

        async function handleLogin() {
            const e = document.getElementById('email').value; const p = document.getElementById('password').value;
            try { await auth.signInWithEmailAndPassword(e, p); } catch(err) { alert(err.message); }
        }
        function handleLogout() { auth.signOut(); }

        function loadUserData() {
            db.collection('users').doc(currentUser.uid).onSnapshot(doc => {
                state = doc.exists ? doc.data().progress || {} : {};
                if (!state.customTasks) state.customTasks = {};
                if (!state.plannerTasks) state.plannerTasks = {};
                renderTabs(); renderContent(currentTab); updateGlobalStats();
            });
        }
        function saveState() { if(currentUser) db.collection('users').doc(currentUser.uid).set({ progress: state }, { merge: true }); updateGlobalStats(); }

        function renderTabs() {
            const n = document.getElementById('categoryNav'); n.innerHTML='';
            Object.keys(syllabusData).forEach(k=>{
                const d=document.createElement('div'); d.className=`nav-item ${k===currentTab?'active':''}`;
                d.innerHTML=`<span class="nav-icon">${syllabusData[k].icon}</span><span class="nav-label">${syllabusData[k].label}</span>`;
                d.onclick=()=>{currentTab=k;renderTabs();renderContent(k);}; n.appendChild(d);
            });
            document.getElementById('addTaskBtn').style.display = ['daily','planner'].includes(currentTab) ? 'flex' : 'none';
        }

        function renderContent(k) {
            const c=document.getElementById('contentArea'); c.innerHTML='';
            if(k==='daily') { renderDaily(c); return; }
            if(k==='planner') { renderPlanner(c); return; }

            syllabusData[k].sections.forEach(s=>{
                const h=document.createElement('div'); h.className='section-header'; h.textContent=s.title; c.appendChild(h);
                s.topics.forEach(t=>{
                    const id=`${k}-${t.replace(/\s/g,'')}`; const td=state[id]||{done:false};
                    const div=document.createElement('div'); div.className='topic-wrapper';
                    div.innerHTML=`<div class="topic-main"><div><h3>${t}</h3><div class="topic-status ${td.done?'active':''}">${td.done?'Completed':'Pending'}</div></div><label class="switch master-switch"><input type="checkbox" onchange="toggleSyllabus('${id}')" ${td.done?'checked':''}><span class="slider"></span></label></div>`;
                    c.appendChild(div);
                });
            });
        }

        function toggleSyllabus(id) {
            if(!state[id]) state[id] = {};
            state[id].done = event.target.checked;
            saveState(); renderContent(currentTab);
        }

        // --- PLANNER LOGIC (1-4-7) ---
        function renderPlanner(container) {
            const today = new Date().toDateString();
            const h = document.createElement('div'); h.className='section-header'; h.textContent="Revisions Due Today"; container.appendChild(h);
            
            let found = false;
            Object.entries(state.plannerTasks || {}).forEach(([id, task]) => {
                const start = new Date(task.startDate);
                const checkDates = { 
                    r1: new Date(new Date(start).setDate(start.getDate()+1)).toDateString(),
                    r4: new Date(new Date(start).setDate(start.getDate()+4)).toDateString(),
                    r7: new Date(new Date(start).setDate(start.getDate()+7)).toDateString()
                };

                Object.entries(checkDates).forEach(([key, dateStr]) => {
                    if(dateStr === today) {
                        found = true;
                        const isDone = task.completions && task.completions[today + key];
                        const div=document.createElement('div'); div.className='task-card';
                        div.style.borderLeftColor = key==='r1'?'var(--primary)':key==='r4'?'var(--warning)':'var(--secondary)';
                        div.innerHTML=`<div class="task-meta"><span class="task-tag">${key.toUpperCase()} Rev</span><h4>${task.name}</h4></div><label class="switch master-switch"><input type="checkbox" onchange="togglePlannerRev('${id}','${key}')" ${isDone?'checked':''}><span class="slider"></span></label>`;
                        container.appendChild(div);
                    }
                });
            });
            if(!found) container.innerHTML += `<div class="empty-state">No revisions scheduled for today.</div>`;
        }

        function togglePlannerRev(id, key) {
            const today = new Date().toDateString();
            if(!state.plannerTasks[id].completions) state.plannerTasks[id].completions = {};
            if(event.target.checked) state.plannerTasks[id].completions[today + key] = true;
            else delete state.plannerTasks[id].completions[today + key];
            saveState(); renderContent('planner');
        }

        // --- MODAL & ADD LOGIC ---
        function openContextModal() {
            const m = document.getElementById('genericModal'); const content = document.getElementById('modalContent');
            m.classList.add('show');
            if(currentTab === 'daily') {
                content.innerHTML = `<div class="chat-header"><h3>New Daily Task</h3><button onclick="closeModal()">×</button></div><input type="text" id="tName" class="auth-input" placeholder="Task Name"><div class="days-selector">${['S','M','T','W','T','F','S'].map((d,i)=>`<button class="day-btn" onclick="this.classList.toggle('selected')" data-day="${i}">${d}</button>`).join('')}</div><button class="auth-btn" style="margin-top:20px;" onclick="addDailyTask()">Save Task</button>`;
            } else {
                content.innerHTML = `<div class="chat-header"><h3>New 1-4-7 Revision</h3><button onclick="closeModal()">×</button></div><input type="text" id="pName" class="auth-input" placeholder="Topic Name"><input type="date" id="pDate" class="auth-input" value="${new Date().toISOString().split('T')[0]}"><button class="auth-btn" style="margin-top:20px;" onclick="addPlannerTask()">Start Tracking</button>`;
            }
        }
        function closeModal() { document.getElementById('genericModal').classList.remove('show'); }

        function addPlannerTask() {
            const name = document.getElementById('pName').value; const date = document.getElementById('pDate').value;
            if(!name || !date) return;
            const id = 'p-'+Date.now();
            state.plannerTasks[id] = { name, startDate: date, completions: {} };
            saveState(); closeModal(); renderContent('planner');
        }

        function addDailyTask() {
            const name = document.getElementById('tName').value;
            const days = Array.from(document.querySelectorAll('.day-btn.selected')).map(b => parseInt(b.dataset.day));
            if(!name || days.length === 0) return;
            const id = 'd-'+Date.now();
            state.customTasks[id] = { name, days, completions: {} };
            saveState(); closeModal(); renderContent('daily');
        }

        function renderDaily(container) {
            const day = new Date().getDay(); const date = new Date().toDateString();
            const h = document.createElement('div'); h.className='section-header'; h.textContent="Daily Habits"; container.appendChild(h);
            Object.entries(state.customTasks || {}).forEach(([id, task]) => {
                if(task.days.includes(day)) {
                    const isDone = task.completions && task.completions[date];
                    const div=document.createElement('div'); div.className='topic-wrapper';
                    div.innerHTML=`<div class="topic-main"><div><h3>${task.name}</h3><div class="topic-status ${isDone?'active':''}">${isDone?'Done':'Pending'}</div></div><label class="switch master-switch"><input type="checkbox" onchange="toggleDaily('${id}')" ${isDone?'checked':''}><span class="slider"></span></label></div>`;
                    container.appendChild(div);
                }
            });
        }
        function toggleDaily(id) {
            const date = new Date().toDateString();
            if(!state.customTasks[id].completions) state.customTasks[id].completions = {};
            state.customTasks[id].completions[date] = event.target.checked;
            saveState(); renderContent('daily');
        }

        function updateGlobalStats() {
            let t=0, c=0;
            Object.keys(syllabusData).filter(k=>!['daily','planner'].includes(k)).forEach(k=>{
                syllabusData[k].sections?.forEach(s=>s.topics.forEach(tp=>{
                    t++; if(state[`${k}-${tp.replace(/\s/g,'')}`]?.done) c++;
                }));
            });
            const p = t===0 ? 0 : Math.round((c/t)*100);
            document.getElementById('globalBar').style.width = p+'%';
            document.getElementById('globalText').textContent = p+'% Syllabus Covered';
        }

        function toggleTheme() {
            const cur = document.documentElement.getAttribute('data-theme');
            document.documentElement.setAttribute('data-theme', cur==='dark'?'light':'dark');
        }
    </script>
</body>
</html>
