<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BankPrep Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <style>
        :root {
            --primary: #4f46e5; --secondary: #ec4899;
            --bg-body: #f8fafc; --bg-card: #ffffff;
            --text-main: #0f172a; --text-muted: #64748b;
            --success: #10b981; --danger: #ef4444; --warning: #f59e0b;
            --border-color: rgba(0,0,0,0.05);
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            --radius: 16px;
        }

        [data-theme="dark"] {
            --bg-body: #0f172a; --bg-card: #1e293b;
            --text-main: #f1f5f9; --text-muted: #94a3b8;
            --border-color: rgba(255,255,255,0.05);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; transition: background 0.2s, color 0.2s; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg-body); color: var(--text-main); margin: 0; padding-bottom: 100px; }

        /* --- AUTH --- */
        #authScreen { position: fixed; inset: 0; background: linear-gradient(135deg, var(--primary), var(--secondary)); display: flex; align-items: center; justify-content: center; z-index: 5000; }
        .auth-card { background: var(--bg-card); width: 90%; max-width: 360px; padding: 30px; border-radius: 28px; text-align: center; }
        .auth-input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border-color); margin-bottom: 12px; background: var(--bg-body); color: var(--text-main); }
        .auth-btn { width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--primary); color: white; font-weight: 700; cursor: pointer; }

        /* --- HEADER --- */
        .fixed-header { position: fixed; top: 0; width: 100%; z-index: 1000; background: var(--bg-body); }
        .app-bar { background: linear-gradient(135deg, var(--primary), var(--secondary)); padding: 20px 20px 50px 20px; color: white; border-radius: 0 0 30px 30px; }
        .bar-top { display: flex; justify-content: space-between; align-items: flex-start; }
        
        .progress-cont { background: rgba(0,0,0,0.2); height: 8px; border-radius: 10px; margin-top: 20px; overflow: hidden; }
        #progFill { height: 100%; background: white; width: 0%; transition: width 0.5s; }

        /* --- NAV --- */
        .nav-scroll { display: flex; gap: 10px; overflow-x: auto; padding: 0 20px 15px 20px; margin-top: -30px; scrollbar-width: none; }
        .nav-item { background: var(--bg-card); padding: 12px 18px; border-radius: 14px; box-shadow: var(--shadow); cursor: pointer; border: 2px solid transparent; flex-shrink: 0; text-align: center; min-width: 90px;}
        .nav-item.active { border-color: var(--primary); }
        .nav-icon { display: block; font-size: 1.4rem; }
        .nav-label { font-size: 0.7rem; font-weight: 700; }

        /* --- CONTENT --- */
        .content { padding: 20px; }
        .section-title { font-size: 0.75rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin: 20px 0 10px 5px; display: flex; align-items: center; }
        .section-title::before { content: ''; width: 6px; height: 6px; background: var(--secondary); border-radius: 50%; margin-right: 8px; }

        /* --- CARDS --- */
        .card { background: var(--bg-card); border-radius: var(--radius); padding: 18px; margin-bottom: 12px; box-shadow: var(--shadow); border: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .card-info h3 { margin: 0; font-size: 0.9rem; }
        .card-sub { font-size: 0.7rem; color: var(--text-muted); margin-top: 4px; }
        .card-sub.active { color: var(--success); font-weight: 700; }

        /* --- REVISION CARDS --- */
        .rev-card { border-left: 5px solid var(--primary); }
        .rev-tag { font-size: 0.65rem; background: #eef2ff; color: var(--primary); padding: 2px 8px; border-radius: 4px; font-weight: 700; margin-bottom: 5px; display: inline-block; }

        /* --- SWITCH --- */
        .switch { position: relative; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; inset: 0; background: #cbd5e1; border-radius: 30px; cursor: pointer; }
        .slider:before { content: ""; position: absolute; height: 18px; width: 18px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: 0.2s; }
        input:checked + .slider { background: var(--success); }
        input:checked + .slider:before { transform: translateX(20px); }
        .planner-switch input:checked + .slider { background: var(--primary); }

        /* --- FAB --- */
        .fab { position: fixed; bottom: 30px; right: 20px; width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; border: none; box-shadow: 0 8px 20px rgba(0,0,0,0.2); cursor: pointer; display: none; align-items: center; justify-content: center; z-index: 2000; font-size: 24px; }

        /* --- MODAL --- */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 3000; display: none; align-items: flex-end; justify-content: center; }
        .modal-card { background: var(--bg-card); width: 100%; max-width: 500px; border-radius: 24px 24px 0 0; padding: 30px; animation: slideUp 0.3s; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .day-flex { display: flex; justify-content: space-between; margin: 15px 0; }
        .day-btn { width: 35px; height: 35px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-body); cursor: pointer; font-weight: 700; font-size: 0.7rem; }
        .day-btn.selected { background: var(--primary); color: white; border-color: var(--primary); }

        .empty { text-align: center; padding: 40px; color: var(--text-muted); }
    </style>
</head>
<body>

    <div id="authScreen">
        <div class="auth-card">
            <h2>BankPrep Cloud</h2>
            <input type="email" id="email" class="auth-input" placeholder="Email">
            <input type="password" id="password" class="auth-input" placeholder="Password">
            <button class="auth-btn" onclick="handleAuth()">Sign In / Sign Up</button>
            <p id="authErr" style="color:red; font-size:0.7rem; margin-top:10px;"></p>
        </div>
    </div>

    <div id="app" style="display:none;">
        <div class="fixed-header" id="fHeader">
            <header class="app-bar">
                <div class="bar-top">
                    <div>
                        <h2 style="margin:0; font-size: 1.1rem;">BankPrep Tracker</h2>
                        <span style="font-size:0.7rem; opacity:0.8;">Syllabus & Planner</span>
                    </div>
                    <button onclick="auth.signOut()" style="background:none; border:none; color:white; font-size:1.2rem;">🚪</button>
                </div>
                <div class="progress-cont"><div id="progFill"></div></div>
                <div id="progText" style="font-size:0.7rem; margin-top:5px; text-align:right;">0% Covered</div>
            </header>
            <nav class="nav-scroll" id="navbar"></nav>
        </div>

        <main class="content" id="mainContent"></main>
        
        <button class="fab" id="fab" onclick="openModal()">+</button>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal-card" id="modalBody"></div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBPSXcRdCoik4vAKJxjB2258bWSpe_6nGU", authDomain: "bankprep-tracker.firebaseapp.com", projectId: "bankprep-tracker", storageBucket: "bankprep-tracker.firebasestorage.app", messagingSenderId: "254084569056", appId: "1:254084569056:web:a6e3a75e0d80372b373d85" };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(); const db = firebase.firestore();

        const syllabus = {
            "daily": { label: "Daily", icon: "📅" },
            "planner": { label: "1-4-7 Planner", icon: "🕒" },
            "quant": { label: "Quant", icon: "📊", sections: [{title: "Arithmetic", topics: ["Percentages", "Ratio & Proportion", "Average", "Profit & Loss", "Simple Interest", "Compound Interest", "Time & Work", "Speed Distance Time"]}] },
            "logic": { label: "Reasoning", icon: "🧠", sections: [{title: "Logic", topics: ["Syllogism", "Inequality", "Blood Relations", "Direction Sense", "Puzzles", "Seating Arrangement"]}] },
            "english": { label: "English", icon: "📖", sections: [{title: "Grammar", topics: ["Tenses", "Subject Verb Agreement", "Prepositions", "Articles", "Error Spotting"]}] }
        };

        let state = {}; let currentTab = 'planner'; let tempDays = [];

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('authScreen').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                loadData(user.uid);
            } else {
                document.getElementById('authScreen').style.display = 'flex';
                document.getElementById('app').style.display = 'none';
            }
        });

        async function handleAuth() {
            const e = document.getElementById('email').value; const p = document.getElementById('password').value;
            try { await auth.signInWithEmailAndPassword(e, p); } 
            catch { try { await auth.createUserWithEmailAndPassword(e, p); } catch(err) { document.getElementById('authErr').innerText = err.message; } }
        }

        function loadData(uid) {
            db.collection('users').doc(uid).onSnapshot(doc => {
                state = doc.exists ? doc.data() : { syllabus: {}, daily: {}, planner: [] };
                renderNav(); renderContent(); updateProgress();
            });
        }

        function save() { db.collection('users').doc(auth.currentUser.uid).set(state); }

        function renderNav() {
            const nav = document.getElementById('navbar'); nav.innerHTML = '';
            Object.keys(syllabus).forEach(k => {
                const item = document.createElement('div');
                item.className = `nav-item ${currentTab === k ? 'active' : ''}`;
                item.innerHTML = `<span class="nav-icon">${syllabus[k].icon}</span><span class="nav-label">${syllabus[k].label}</span>`;
                item.onclick = () => { currentTab = k; renderNav(); renderContent(); };
                nav.appendChild(item);
            });
            document.getElementById('fab').style.display = (currentTab === 'daily' || currentTab === 'planner') ? 'flex' : 'none';
            document.body.style.paddingTop = document.getElementById('fHeader').offsetHeight + 'px';
        }

        function renderContent() {
            const cont = document.getElementById('mainContent'); cont.innerHTML = '';
            if (currentTab === 'daily') return renderDailyTab(cont);
            if (currentTab === 'planner') return renderPlannerTab(cont);

            syllabus[currentTab].sections.forEach(s => {
                cont.innerHTML += `<div class="section-title">${s.title}</div>`;
                s.topics.forEach(t => {
                    const done = state.syllabus?.[t] || false;
                    const card = document.createElement('div'); card.className = 'card';
                    card.innerHTML = `<div class="card-info"><h3>${t}</h3><div class="card-sub ${done?'active':''}">${done?'Completed':'Pending'}</div></div><label class="switch"><input type="checkbox" onchange="toggleSyllabus('${t}')" ${done?'checked':''}><span class="slider"></span></label>`;
                    cont.appendChild(card);
                });
            });
        }

        /* --- SYLLABUS LOGIC --- */
        function toggleSyllabus(topic) {
            if(!state.syllabus) state.syllabus = {};
            state.syllabus[topic] = event.target.checked;
            save();
        }

        /* --- DAILY LOGIC --- */
        function renderDailyTab(cont) {
            const today = new Date().getDay(); const dateKey = new Date().toDateString();
            cont.innerHTML = `<div class="section-title">Today's Tasks</div>`;
            let hasTasks = false;
            Object.entries(state.daily || {}).forEach(([id, task]) => {
                if(task.days.includes(today)) {
                    hasTasks = true;
                    const done = task.history?.[dateKey] || false;
                    const card = document.createElement('div'); card.className = 'card';
                    card.innerHTML = `<div class="card-info"><h3>${task.name}</h3><div class="card-sub">${done?'Done for today':'Remaining'}</div></div><label class="switch"><input type="checkbox" onchange="toggleDaily('${id}')" ${done?'checked':''}><span class="slider"></span></label>`;
                    cont.appendChild(card);
                }
            });
            if(!hasTasks) cont.innerHTML += `<div class="empty">No tasks set for today. Use + to add recurring tasks.</div>`;
        }

        function toggleDaily(id) {
            const dateKey = new Date().toDateString();
            if(!state.daily[id].history) state.daily[id].history = {};
            state.daily[id].history[dateKey] = event.target.checked;
            save();
        }

        /* --- PLANNER (1-4-7) LOGIC --- */
        function renderPlannerTab(cont) {
            const today = new Date(); const todayStr = today.toDateString();
            cont.innerHTML = `<div class="section-title">Scheduled Revisions</div>`;
            let count = 0;
            (state.planner || []).forEach((item, index) => {
                const start = new Date(item.date);
                const schedule = [
                    { day: 1, label: "1st Revision" },
                    { day: 4, label: "4th Day Revision" },
                    { day: 7, label: "7th Day Revision" }
                ];

                schedule.forEach(step => {
                    const due = new Date(start); due.setDate(start.getDate() + step.day);
                    if(due.toDateString() === todayStr) {
                        count++;
                        const compKey = `${todayStr}-${step.day}`;
                        const done = item.completions?.[compKey] || false;
                        const card = document.createElement('div'); card.className = 'card rev-card';
                        card.innerHTML = `<div><span class="rev-tag">${step.label}</span><h3>${item.topic}</h3></div><label class="switch planner-switch"><input type="checkbox" onchange="togglePlanner(${index}, '${compKey}')" ${done?'checked':''}><span class="slider"></span></label>`;
                        cont.appendChild(card);
                    }
                });
            });
            if(count === 0) cont.innerHTML += `<div class="empty">🎉 All clear! No revisions due today.</div>`;
        }

        function togglePlanner(idx, key) {
            if(!state.planner[idx].completions) state.planner[idx].completions = {};
            state.planner[idx].completions[key] = event.target.checked;
            save();
        }

        /* --- MODAL LOGIC --- */
        function openModal() {
            const modal = document.getElementById('modal'); const body = document.getElementById('modalBody');
            modal.style.display = 'flex'; tempDays = [];
            if(currentTab === 'daily') {
                body.innerHTML = `<h3>Add Habit</h3><input type="text" id="mName" class="auth-input" placeholder="Task Name"><div class="day-flex">${['S','M','T','W','T','F','S'].map((d,i)=>`<button class="day-btn" onclick="selDay(this,${i})">${d}</button>`).join('')}</div><button class="auth-btn" onclick="addDaily()">Add Task</button>`;
            } else {
                body.innerHTML = `<h3>Add to 1-4-7 Planner</h3><input type="text" id="mTopic" class="auth-input" placeholder="Topic Name"><p style="font-size:0.7rem; color:grey;">When did you complete this?</p><input type="date" id="mDate" class="auth-input" value="${new Date().toISOString().split('T')[0]}"><button class="auth-btn" onclick="addPlanner()">Start 1-4-7 Rule</button>`;
            }
        }

        function selDay(btn, i) { btn.classList.toggle('selected'); if(tempDays.includes(i)) tempDays = tempDays.filter(x=>x!==i); else tempDays.push(i); }

        function addDaily() {
            const name = document.getElementById('mName').value; if(!name || tempDays.length===0) return;
            if(!state.daily) state.daily = {};
            const id = 'd'+Date.now(); state.daily[id] = { name, days: tempDays, history: {} };
            save(); closeModal();
        }

        function addPlanner() {
            const topic = document.getElementById('mTopic').value; const date = document.getElementById('mDate').value;
            if(!topic || !date) return;
            if(!state.planner) state.planner = [];
            state.planner.push({ topic, date, completions: {} });
            save(); closeModal();
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        window.onclick = (e) => { if(e.target.id === 'modal') closeModal(); }

        function updateProgress() {
            let total = 0; let done = 0;
            Object.values(syllabus).forEach(cat => {
                cat.sections?.forEach(sec => sec.topics.forEach(t => { total++; if(state.syllabus?.[t]) done++; }));
            });
            const p = total === 0 ? 0 : Math.round((done/total)*100);
            document.getElementById('progFill').style.width = p + '%';
            document.getElementById('progText').innerText = p + '% Covered';
        }
    </script>
</body>
</html>
